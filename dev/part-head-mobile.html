<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hollow Reflections — Act One</title>
<style>
/* ============================================================
   PROJECT HOLLOWING — mobile gacha shell. Dark anime-fantasy.
   Pure CSS + inline SVG. No rasters or CDNs; versioned local save storage.
   ============================================================ */
:root{
  --bg:#0a0d14; --panel:#121826; --panel2:#0e1320; --line:#232c40;
  --ink:#e4eaf4; --dim:#a4b0c5; --faint:#78869f;
  --fire:#ff6b3d; --water:#4db8ff; --earth:#7ed957; --thunder:#ffd94d;
  --light:#ffe9b0; --dark:#b06bff; --hollow:#9adfd4;
  --hp:#5fd38a; --hplow:#e05c5c; --brk:#e8a33d; --energy:#59c8ff;
  --warn:#ff8080; --heal:#7be0a2; --gold:#e8c86a;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:
    radial-gradient(1100px 600px at 75% -10%, #101a3055, transparent 60%),
    radial-gradient(800px 500px at 15% 110%, #14203544, transparent 60%),
    #05070c;
  color:var(--ink);
  font:14px/1.45 "Segoe UI", system-ui, sans-serif;
  display:flex; justify-content:center; overflow:hidden;
}
h1,h2,h3{font-family:Georgia, "Times New Roman", serif; font-weight:600; letter-spacing:.4px;}
button{
  font:inherit; color:var(--ink); background:linear-gradient(180deg,#1c2438,#141b2c);
  border:1px solid var(--line); border-radius:9px; padding:8px 14px; cursor:pointer;
  min-height:42px; transition:.15s; -webkit-tap-highlight-color:transparent;
}
button:hover:not(:disabled){border-color:#3d4d73; box-shadow:0 0 10px #4db8ff22;}
button:disabled{opacity:.38; cursor:default;}
button:focus-visible,[tabindex]:focus-visible{
  outline:3px solid #9adfd4; outline-offset:2px; box-shadow:0 0 0 5px #0a0d14,0 0 18px #9adfd477;
}
.small{font-size:12.5px; color:var(--dim);}
.gold{color:var(--gold);}

/* ---------- the phone frame ---------- */
#frame{
  position:relative; width:min(430px,100vw); height:100dvh;
  display:flex; flex-direction:column; overflow:hidden;
  background:
    radial-gradient(700px 420px at 70% -8%, #16203a55, transparent 60%),
    radial-gradient(520px 320px at 8% 108%, #1b283f44, transparent 60%),
    var(--bg);
}
@media (min-width:470px){
  #frame{border-left:1px solid #1b2334; border-right:1px solid #1b2334;
    box-shadow:0 0 90px #000c, 0 0 0 1px #0b1220;}
}
#app{flex:1 1 auto; min-height:0; overflow-y:auto; overflow-x:hidden; position:relative;
  -webkit-overflow-scrolling:touch; scrollbar-width:thin; scrollbar-color:#26304a transparent;}
body.inbattle #app{overflow:hidden;}

/* ---------- bottom nav ---------- */
#bottomnav{
  flex:0 0 auto; display:flex; z-index:20;
  background:linear-gradient(180deg,#111828,#0a0f1b);
  border-top:1px solid #22304c; padding:5px 4px calc(6px + env(safe-area-inset-bottom));
}
body.nonav #bottomnav{display:none;}
.navbtn{
  flex:1; background:none; border:none; border-radius:10px; padding:5px 0 3px; min-height:50px;
  display:flex; flex-direction:column; align-items:center; gap:1px;
  color:#8492aa; font-size:9.5px; letter-spacing:1px; text-transform:uppercase; cursor:pointer;
}
.navbtn svg{width:22px; height:22px;}
.navbtn:hover{color:#bdc8da;}
.navbtn.active{color:var(--hollow); background:#18233588;}
.navbtn.active svg{filter:drop-shadow(0 0 7px #9adfd4aa);}
.navbtn.active .nlbl{text-shadow:0 0 9px #9adfd488;}

/* ---------- element theming ---------- */
.e-fire{--ec:var(--fire);} .e-water{--ec:var(--water);} .e-earth{--ec:var(--earth);}
.e-thunder{--ec:var(--thunder);} .e-light{--ec:var(--light);} .e-dark{--ec:var(--dark);}
.e-hollow{--ec:var(--hollow);}
.ei{width:12px; height:12px; vertical-align:-1.5px;}

/* ---------- shared screen chrome ---------- */
.shead{
  position:sticky; top:0; z-index:6; display:flex; align-items:center; gap:10px;
  padding:12px 14px 10px; border-bottom:1px solid #1a2336;
  background:linear-gradient(180deg,#0c1119f5,#0c1119e0); backdrop-filter:blur(5px);
}
.shead h2{font-size:18px; letter-spacing:1px; flex:1;}
.shead::after{content:"";position:absolute;left:14px;bottom:-1px;width:76px;height:1px;background:linear-gradient(90deg,var(--hollow),transparent);box-shadow:0 0 8px #9adfd477;}
.sigil-pill{
  display:inline-flex; align-items:center; gap:5px; white-space:nowrap;
  background:#141b2c; border:1px solid #33406044; border-radius:999px;
  padding:3px 10px 3px 8px; font-size:12.5px; color:var(--gold); font-weight:600;
}
.sigil-pill svg{width:13px; height:13px;}
.sigil-count{color:var(--gold); font-weight:600;}
.wallet-pill{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}.gold-pill{display:inline-flex;align-items:center;gap:4px;background:#17150e;border:1px solid #54451f;border-radius:999px;padding:3px 9px 3px 7px;color:#f0d27a;font-size:12px;font-weight:700}.gold-pill i{width:11px;height:11px;border-radius:50%;display:inline-block;background:radial-gradient(circle at 35% 30%,#fff2a5,#e3b23f 48%,#8c5b15 100%);border:1px solid #f3d46a;box-shadow:0 0 5px #dcae3b55}
.scene{width:100%; height:100%; display:block;}

/* ---------- title ---------- */
.title-wrap{min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:13px; padding:24px 20px;}
.title-hollow{
  font-family:Georgia,serif; font-size:34px; letter-spacing:6px; font-weight:700;
  background:linear-gradient(180deg,#eef7f5 20%, var(--hollow) 60%, #29403c);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 0 42px #9adfd433;
}
.title-sub{color:var(--dim); letter-spacing:3px; font-size:11px; text-transform:uppercase;}
.title-glyph{width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%, #d9f4ee 0%, #9adfd4 22%, #23413c 65%, #0d1512 100%);
  box-shadow:0 0 60px #9adfd440, inset 0 0 30px #05201b; position:relative; margin-bottom:6px;}
.title-glyph::after{content:""; position:absolute; inset:11px; border-radius:50%; border:1px solid #d9f4ee33;}
.save-title{justify-content:flex-start; padding-top:20px; padding-bottom:28px; gap:9px;}
.save-title .title-glyph{width:72px;height:72px;margin-bottom:0;}.save-title .title-hollow{font-size:29px;}.save-title .title-sub{margin-bottom:2px;}
.save-profile{width:min(360px,100%);text-align:left;border:1px solid #33405a;border-radius:13px;padding:11px 12px;background:linear-gradient(145deg,#151d2d,#0c121e);box-shadow:0 8px 25px #0005;}
.save-profile-head{display:flex;justify-content:space-between;align-items:center}.save-profile-head b{display:block;color:#edf3fb;font-size:13px}.save-profile-head span{display:block;color:var(--dim);font-size:9px;letter-spacing:.5px}.save-dot{width:9px;height:9px;border-radius:50%;background:var(--hp);box-shadow:0 0 9px #5fd38aaa}.save-dot.bad{background:var(--warn);box-shadow:0 0 9px #ff8080aa}
.save-summary{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;margin:9px 0 6px;padding:7px 8px;background:#0a101b;border-radius:8px;font-size:10.5px}.save-summary span{color:var(--faint);text-transform:uppercase;letter-spacing:1px}.save-summary b{text-align:right;color:#dfe7f3}.save-id{font-family:monospace;font-size:8.5px;color:#65728a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.save-status{font-size:9px;color:#8bd9b1;margin-top:2px}.save-status.bad{color:var(--warn)}
.account-row{display:flex;justify-content:space-between;align-items:center;gap:8px;border-top:1px solid #253047;margin-top:8px;padding-top:8px}.account-row b{display:block;font-size:10.5px}.account-row span{display:block;color:var(--faint);font-size:8.5px}.account-row button{min-height:32px;padding:4px 9px;font-size:9px;white-space:nowrap}.save-title .bigbtn{margin:4px auto 2px}.save-tools{width:min(360px,100%);display:flex;gap:6px}.save-tools button{flex:1;min-height:36px;padding:5px 4px;font-size:9.5px}.save-tools .danger{color:#eaa0a0;border-color:#59353d}

/* ---------- HOME ---------- */
.home-banner{position:relative; height:216px; overflow:hidden; border-bottom:1px solid #1a2336;}
.home-banner .scene{position:absolute; inset:0;}
.home-featured-art{position:absolute;right:-18px;bottom:-14px;width:67%;height:112%;object-fit:contain;object-position:right bottom;filter:drop-shadow(0 8px 14px #000b);pointer-events:none;}
.banner-shade{position:absolute; inset:0; background:linear-gradient(180deg,#0a0d1440 0%, transparent 34%, #0a0d14f2 97%);}
.banner-ch{position:absolute; left:14px; bottom:8px;}
.banner-ch .bk{font-size:10px; letter-spacing:2.5px; color:var(--gold); text-transform:uppercase;}
.banner-ch .bt{font-family:Georgia,serif; font-size:21px; color:#eef3fb; text-shadow:0 2px 10px #000;}
.home-banner .wallet-pill{position:absolute; top:10px; right:10px; box-shadow:0 2px 10px #000a;}
.ticker{
  display:flex; align-items:center; gap:8px; margin:11px 12px 0; padding:6px 10px;
  background:#0f1524; border:1px solid #1d2740; border-radius:9px;
  font-size:12px; color:#c0cbe0; overflow:hidden; white-space:nowrap;
}
.ticker .tklbl{flex:none; font-size:9.5px; letter-spacing:1.5px; color:var(--hollow); border:1px solid #3c5d58; border-radius:5px; padding:2px 6px;}
.ticker .tkwin{flex:1; overflow:hidden;}
.ticker .tk{display:inline-block; padding-left:100%; animation:marq 20s linear infinite;}
@keyframes marq{to{transform:translateX(-100%);}}
.home-kit-strip{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:9px 12px 0;padding:0;background:transparent;}
.home-kit-strip>div{padding:9px 10px;border:1px solid #3d4c6b;border-radius:9px;background:linear-gradient(145deg,#17253aee,#101724ee);box-shadow:0 6px 16px #0005;}
.home-kit-strip b,.home-kit-strip span,.home-kit-strip small{display:block}.home-kit-strip span{font-size:8px;letter-spacing:1.5px;color:var(--hollow)}.home-kit-strip>div+div span{color:var(--gold)}.home-kit-strip b{font-size:11px;margin-top:1px}.home-kit-strip small{font-size:8.5px;color:var(--dim);margin-top:2px;}
.bigbtn{
  display:block; width:calc(100% - 26px); margin:15px auto 8px; padding:13px 14px 11px;
  font-family:Georgia,serif; font-size:17px; letter-spacing:1.2px; color:#1c1305;
  background:linear-gradient(180deg,#f5e0a0,#dcb95c 55%,#b28e36);
  border:1px solid #f7e7b4; border-radius:13px;
  box-shadow:0 5px 20px #e8c86a2e, inset 0 1px 0 #fff8; text-align:center;
}
.bigbtn:hover{box-shadow:0 5px 30px #e8c86a55; border-color:#fff2cf;}
.bigbtn .sub{display:block; font-family:"Segoe UI",system-ui,sans-serif; font-size:10.5px; letter-spacing:.6px; color:#4a3812; margin-top:2px; font-weight:600;}
.homerow{display:flex; gap:9px; margin:4px 13px;}
.homerow button{flex:1; padding:9px 6px; font-size:12px; color:var(--dim);}
#version{
  position:absolute; right:10px; bottom:66px; font-size:10.5px; color:var(--faint);
  cursor:default; user-select:none; z-index:22; padding:5px 7px;
}

/* ---------- STORY list ---------- */
.chlist{padding:8px 0 20px;}
.chrow{
  display:flex; gap:11px; align-items:center; margin:9px 12px; padding:9px;
  background:var(--panel); border:1px solid var(--line); border-radius:13px;
  cursor:pointer; transition:.15s; text-align:left; width:calc(100% - 24px); color:var(--ink);
}
.chrow:hover:not(.locked){border-color:#3d4d73;}
.chrow.current{border-color:var(--gold); box-shadow:0 0 16px #e8c86a2a;}
.chrow.locked{opacity:.45; filter:grayscale(.8); cursor:default;}
.chrow .thumb{width:92px; height:54px; border-radius:8px; overflow:hidden; flex:none; border:1px solid #1a2336; background:#0a0e18; position:relative;}
.chrow .thumb .scene{position:absolute; inset:0;}
.chrow .cmeta{flex:1; min-width:0;}
.chrow .cnum{font-size:9.5px; letter-spacing:2px; color:var(--gold); text-transform:uppercase;}
.chrow.locked .cnum{color:var(--faint);}
.chrow .ctitle{font-family:Georgia,serif; font-size:15.5px; color:#e8eef8; margin:1px 0;}
.chrow .cdesc{font-size:11px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.chrow .cstate{flex:none; font-size:9.5px; letter-spacing:1px; text-align:center; min-width:58px;}
.cstate .tag{display:inline-block; border:1px solid; border-radius:6px; padding:2px 7px;}
.cstate .tag.go{color:#1c1305; background:var(--gold); border-color:#f0dc9c; font-weight:700;}
.cstate .tag.rp{color:var(--hollow); border-color:#2c4a46;}
.cstate .tag.lk{color:var(--faint); border-color:#26304a;}
.cstate .rew{display:block; margin-top:4px; color:var(--gold); font-size:10px;}

/* ---------- PARTY ---------- */
.pgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:12px 12px 22px;}
.pcard{
  --ec:var(--hollow); position:relative; text-align:center; cursor:pointer; transition:.15s;
  background:linear-gradient(180deg,#151d30,#0d1322);
  border:1px solid color-mix(in srgb, var(--ec) 50%, #223); border-radius:13px; padding:8px 5px 7px;
  color:var(--ink);
}
.pcard:hover{box-shadow:0 0 15px color-mix(in srgb, var(--ec) 35%, transparent); transform:translateY(-2px);}
.pcard .port{width:76%; aspect-ratio:1; display:block; margin:1px auto 3px;
  border-radius:50%; background:radial-gradient(circle at 50% 36%, color-mix(in srgb,var(--ec) 24%,#0d1322), #090e18 76%);
  border:1px solid color-mix(in srgb, var(--ec) 40%, #223);}
.pcard img.port{object-fit:cover;object-position:50% 22%;}
.uniticon{overflow:hidden;isolation:isolate}.uniticon img{display:block;width:100%;height:100%;object-fit:cover;object-position:50% 22%}.uniticon img.splash-icon{transform:translate(var(--icon-tx,0),var(--icon-ty,0)) scale(var(--icon-zoom,2));transform-origin:0 0;image-rendering:auto}
.pcard.active-member{border-color:#6ea88c;box-shadow:inset 0 0 14px #4eae8322}.active-slot{position:absolute;top:5px;right:6px;z-index:5;padding:2px 4px;border-radius:4px;background:#10281e;color:#8de0bd;font-size:6px;letter-spacing:.7px}
.pcard .uname{font-size:12px; font-weight:600;}
.pcard .urole{font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:1px;}
.rarity-stars{display:inline-block; color:var(--gold); font-size:12px; letter-spacing:1px; line-height:1.2; text-shadow:0 0 7px #e8c86a55;}
.pcard .rarity-stars{display:block; margin-top:3px; font-size:10px;}
.pcard .ulevel{font-size:9px; color:var(--dim); margin-top:1px;}
.xpmini{position:relative;height:9px;margin:3px 4px 0;border:1px solid #273650;border-radius:4px;background:#080d16;overflow:hidden}.xpmini i{display:block;height:100%;background:linear-gradient(90deg,#6d55c7,#b893ff)}.xpmini span{position:absolute;inset:0;font-size:5.8px;line-height:8px;color:#f3edff;text-shadow:0 1px 2px #000}
.rankpips{display:flex; gap:3px; justify-content:center; margin-top:5px; min-height:8px;}
.rp{width:7px; height:7px; transform:rotate(45deg); background:#121a2c; border:1px solid #2c3a54; border-radius:1px;}
.rp.on{background:linear-gradient(135deg,#fdf3cf,var(--gold)); border-color:#f0dc9c; box-shadow:0 0 5px #e8c86a88;}
.library-open{width:calc(100% - 24px); margin:10px 12px 4px; padding:10px 13px; display:flex; justify-content:space-between; align-items:center; text-align:left; border-color:#6d5b33; background:linear-gradient(110deg,#191a26,#111827);}
.party-toolbar{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 12px 4px}.party-toolbar .library-open{width:100%;margin:0}.party-toolbar button{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;text-align:left;min-height:50px}.party-toolbar #editparty{border-color:#426752;background:linear-gradient(110deg,#13231d,#101827)}.party-toolbar #editparty b{color:#8de0bd}.party-toolbar button span{font-size:8px;color:var(--dim);margin-top:2px}.formation-note{margin:10px 14px 4px}.formation-slots{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:8px 12px 2px}.formation-slot{min-width:0;padding:7px 3px;text-align:center;border:1px dashed #303c50;border-radius:7px;background:#090e17}.formation-slot b,.formation-slot span{display:block}.formation-slot b{font-size:8px;color:var(--faint)}.formation-slot span{font-size:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#566277}.formation-slot.filled{border-style:solid;border-color:color-mix(in srgb,var(--ec) 55%,#27334a);background:#111a28}.formation-slot.filled span{color:#dbe5f3}.formation-actions{position:sticky;bottom:0;z-index:9;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:#090e18ee;border-top:1px solid #273249}
.library-open b{color:var(--gold); font-family:Georgia,serif;}.library-open span{color:var(--dim); font-size:9px;}
.library-intro{display:flex; justify-content:space-between; align-items:center; margin:10px 12px 4px;}.library-intro > div{text-align:right;}.library-intro b{display:block;color:var(--gold);}.library-intro span{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:1px;}
.library-controls{display:flex;align-items:center;gap:7px;padding:0 12px 7px}.library-filters{display:flex;gap:5px;overflow-x:auto;flex:1;scrollbar-width:none}.library-filters button{min-height:28px;padding:4px 10px;border-radius:999px;font-size:9px;letter-spacing:.7px;text-transform:uppercase;color:var(--dim);background:#0e1320;border-color:#2b3850;white-space:nowrap}.library-filters button.on{color:#d8fff7;background:#183a38;border-color:#9adfd4;box-shadow:0 0 9px #9adfd433}.library-controls>#librarysort{min-height:28px;padding:4px 8px;font-size:8px;color:var(--dim);white-space:nowrap}.libcard[hidden]{display:none;}
.library-note{margin:5px 14px 10px; color:var(--dim); font-size:10.5px; line-height:1.4;}.library-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 10px 24px;}
.act-map-open{width:calc(100% - 24px);margin:10px 12px 5px;display:flex;justify-content:space-between;align-items:center;text-align:left;border-color:#536b91;background:linear-gradient(110deg,#17253a,#101724)}.act-map-open b{color:#c7ddff}.act-map-open span{font-size:8px;color:var(--dim)}.act-map-head{display:flex;align-items:center;justify-content:space-between;margin:10px 12px}.act-map-head>div{text-align:right}.act-map-head b,.act-map-head span{display:block}.act-map-head b{font-family:Georgia,serif;color:var(--gold)}.act-map-head span{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}.mission-path{display:grid;gap:8px;padding:4px 12px 24px}.mission-node{position:relative;display:grid;grid-template-columns:46px 1fr auto;grid-template-rows:auto auto;align-items:center;gap:1px 8px;min-height:60px;padding:8px 10px;text-align:left;border-color:#2d3b52;background:linear-gradient(100deg,#111a29,#0a101a)}.mission-node .mission-code{grid-row:1/3;display:grid;place-items:center;width:42px;height:42px;border:1px solid #40516d;border-radius:50%;font-weight:900;color:#aab9d1}.mission-node b{font-size:12px}.mission-node small{font-size:8px;color:var(--dim)}.mission-node i{grid-column:3;grid-row:1/3;font-style:normal;font-size:7px;letter-spacing:1px;color:#66738a}.mission-node.available{border-color:#79b89b;box-shadow:0 0 12px #4eae8333}.mission-node.available .mission-code,.mission-node.available i{color:#8de0bd;border-color:#79b89b}.mission-node.cleared{border-color:#6c5d35}.mission-node.cleared .mission-code,.mission-node.cleared i{color:var(--gold);border-color:#8d7740}.mission-node.planned{opacity:.55}.mission-node:disabled{cursor:default}
.libcard{position:relative;min-width:0;padding:6px 4px 8px;overflow:hidden;background:linear-gradient(180deg,#151d30,#0c111d);border:1px solid color-mix(in srgb,var(--ec) 45%,#27334a);border-radius:11px;color:var(--ink);}
.libcard .port{display:block;width:82%;aspect-ratio:1;margin:5px auto 3px;border-radius:50%;background:radial-gradient(circle,#1b2942,#080d16 72%);}.libcard img.port{object-fit:cover;object-position:50% 22%;border:1px solid color-mix(in srgb,var(--ec) 45%,#27334a);}.libindex{position:absolute;top:5px;left:7px;color:var(--faint);font-size:8px;letter-spacing:1px;}.libname{display:block;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.libform{display:block;color:var(--dim);font-size:7.5px;letter-spacing:.6px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.libcard.locked{opacity:1;border-color:#202938;background:linear-gradient(180deg,#0d121c,#070a10);}.libcard.locked .port{filter:brightness(0);opacity:.88;background:#020304;box-shadow:0 0 18px #000 inset;}.libcard.locked .libname{color:#4b5568;letter-spacing:2px;}.libcard.locked .libform{color:#303a4b;}.libcard:disabled{cursor:default;}

polygon(50% 0,100% 35%,70% 100%,0 75%);opacity:.55;animation:evo-float 3s ease-in-out infinite}.evo-shards i:nth-child(1){left:12%;top:30%}.evo-shards i:nth-child(2){right:15%;top:22%;animation-delay:-1s}.evo-shards i:nth-child(3){left:22%;top:52%;animation-delay:-2s}.evo-shards i:nth-child(4){right:20%;top:48%;animation-delay:-.5s}@keyframes evo-ring{to{transform:translate(-50%,-50%) rotate(360deg)}}@keyframes evo-float{50%{transform:translateY(-14px) rotate(18deg);opacity:.9}}

@keyframes hr-kit-orbit{to{transform:rotate(360deg)}}

.pullrow{display:flex; gap:9px; margin:2px 12px;}

/* ---------- battle: portrait layout ---------- */

  -webkit-mask-image:linear-gradient(180deg,#000 50%, transparent 98%);

  position:absolute; left:0; right:0; bottom:0; top:24%; z-index:36;
  background:#0a0f1af8; border-top:1px solid #2c3a5c; border-radius:15px 15px 0 0;
  display:flex; flex-direction:column; animation:sheetup .2s ease-out; box-shadow:0 -14px 50px #000a;
}
.logsheet .lhead{display:flex; justify-content:space-between; align-items:center; padding:9px 14px 8px; border-bottom:1px solid var(--line);}
.logsheet .lhead b{font-size:12px; letter-spacing:1.5px; color:var(--dim); text-transform:uppercase;}
.logsheet .lhead button{font-size:11px; padding:4px 12px;}
.logpane{flex:1; overflow-y:auto; padding:8px 14px 14px; font-size:12px;}
.logpane p{margin:2px 0; color:var(--dim);}
.logpane p.act{color:var(--ink);}
.logpane p.dmg{color:#f0b090;}
.logpane p.edmg{color:#e08b8b;}
.logpane p.heal{color:var(--heal);}
.logpane p.brk{color:var(--brk);}
.logpane p.stagger{color:var(--gold); font-weight:600;}
.logpane p.warn{color:var(--warn); font-weight:600;}
.logpane p.buff{color:#9fc3ee;}
.logpane p.shield{color:var(--hollow);}
.logpane p.blade{color:var(--hollow);}
.logpane p.kill{color:#f3d9a0; font-weight:600;}
.logpane p.sys{color:#b9c6dd; font-style:italic;}
.logpane p.eact{color:#d9a0a0;}
.logpane p.reveal{color:#9fdcff; font-style:italic;}
.logpane p.awaken{color:#eafffb; font-weight:700; text-shadow:0 0 8px #9adfd488;}
.logpane p.rounddiv{color:var(--faint); text-align:center; letter-spacing:2px; margin:7px 0 4px; border-top:1px solid #1b2438; padding-top:5px;}

/* ---------- overlays ---------- */
.overlay{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:50; background:#060910d8; animation:fadein .3s; padding:18px;}
@keyframes fadein{from{opacity:0;}}
.ov-card{width:min(360px,92vw); text-align:center; padding:32px 24px 26px; background:#10182af2; border:1px solid var(--line); border-radius:17px; box-shadow:0 20px 80px #000;}
.ov-card h2{font-size:22px; margin-bottom:12px;}
.ov-card p{color:var(--dim); font-family:Georgia,serif; font-size:15px; margin:8px 0;}
.whiteout{position:fixed; inset:0; background:#f4fffd; z-index:90; opacity:0; animation:whiteout 2.6s forwards;}
@keyframes whiteout{0%{opacity:0;} 45%{opacity:1;} 100%{opacity:1;}}
.awk-flash{position:fixed; inset:0; z-index:80; pointer-events:none;
  background:radial-gradient(circle at 50% 62%, #d9f4ee, #9adfd4 30%, transparent 70%);
  animation:awkflash 1.5s forwards;}
@keyframes awkflash{0%{opacity:0;} 25%{opacity:.95;} 100%{opacity:0;}}
.modal{position:fixed; inset:0; z-index:60; background:#05080fd9; display:flex; align-items:center; justify-content:center; padding:18px;}

/* ---------- squad picker / interlude / misc ---------- */
.pick .pcard.picked{border-color:var(--gold); box-shadow:0 0 14px #e8c86a44;}
.pick .pcard.lockedin{border-color:var(--hollow); box-shadow:0 0 14px #9adfd444; cursor:default;}
.locknote{position:absolute; top:5px; right:7px; font-size:8px; color:var(--hollow); letter-spacing:1px;}
.vignette{border-left:2px solid var(--line); padding:8px 14px; margin:11px 0; font-family:Georgia,serif;}
.vignette .who{color:var(--gold); font-size:11.5px; letter-spacing:2px; text-transform:uppercase;}
.vignette .say{font-size:14.5px; color:#e4ebf6; margin-top:3px;}
.hubrow{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;}
.panelbox{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:17px 17px; margin:13px 12px;}
.credits li{margin:6px 0 6px 16px; color:var(--dim); font-size:12.5px;}
#toast{
  position:absolute; left:50%; bottom:86px; transform:translateX(-50%);
  background:#141c2ef4; border:1px solid #33406a; color:var(--ink);
  padding:8px 16px; border-radius:10px; font-size:12.5px; opacity:0; pointer-events:none;
  transition:opacity .3s; z-index:100; max-width:86%; text-align:center; box-shadow:0 8px 26px #000a;
}
#toast.show{opacity:1;}
.fadein-slow{animation:fadein 1.2s;}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;scroll-behavior:auto !important;}
  .ticker .tk{padding-left:0;}
}
