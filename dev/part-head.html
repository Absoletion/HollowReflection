<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hollow Reflections — Act One</title>
<style>
/* ============================================================
   PROJECT HOLLOWING — mobile gacha shell. Dark anime-fantasy.
   Pure CSS + inline SVG. No rasters, no CDNs, no storage.
   ============================================================ */
:root{
  --bg:#0a0d14; --panel:#121826; --panel2:#0e1320; --line:#232c40;
  --ink:#d7dfec; --dim:#8794ab; --faint:#5a677f;
  --fire:#ff6b3d; --water:#4db8ff; --earth:#7ed957; --thunder:#ffd94d;
  --light:#ffe9b0; --dark:#b06bff; --hollow:#9adfd4;
  --hp:#5fd38a; --hplow:#e05c5c; --brk:#e8a33d; --energy:#59c8ff;
  --warn:#ff8080; --heal:#7be0a2; --gold:#e8c86a;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:
    radial-gradient(1100px 600px at 75% -10%, #101a3055, transparent 60%),
    radial-gradient(800px 500px at 15% 110%, #14203544, transparent 60%),
    #05070c;
  color:var(--ink);
  font:14px/1.45 "Segoe UI", system-ui, sans-serif;
  display:flex; justify-content:center; overflow:hidden;
}
h1,h2,h3{font-family:Georgia, "Times New Roman", serif; font-weight:600; letter-spacing:.4px;}
button{
  font:inherit; color:var(--ink); background:linear-gradient(180deg,#1c2438,#141b2c);
  border:1px solid var(--line); border-radius:9px; padding:8px 14px; cursor:pointer;
  transition:.15s; -webkit-tap-highlight-color:transparent;
}
button:hover:not(:disabled){border-color:#3d4d73; box-shadow:0 0 10px #4db8ff22;}
button:disabled{opacity:.38; cursor:default;}
.small{font-size:12px; color:var(--dim);}
.gold{color:var(--gold);}

/* ---------- the phone frame ---------- */
#frame{
  position:relative; width:min(430px,100vw); height:100dvh;
  display:flex; flex-direction:column; overflow:hidden;
  background:
    radial-gradient(700px 420px at 70% -8%, #16203a55, transparent 60%),
    radial-gradient(520px 320px at 8% 108%, #1b283f44, transparent 60%),
    var(--bg);
}
@media (min-width:470px){
  #frame{border-left:1px solid #1b2334; border-right:1px solid #1b2334;
    box-shadow:0 0 90px #000c, 0 0 0 1px #0b1220;}
}
#app{flex:1 1 auto; min-height:0; overflow-y:auto; overflow-x:hidden; position:relative;
  -webkit-overflow-scrolling:touch; scrollbar-width:thin; scrollbar-color:#26304a transparent;}
body.inbattle #app{overflow:hidden;}

/* ---------- bottom nav ---------- */
#bottomnav{
  flex:0 0 auto; display:flex; z-index:20;
  background:linear-gradient(180deg,#111828,#0a0f1b);
  border-top:1px solid #22304c; padding:5px 4px calc(6px + env(safe-area-inset-bottom));
}
body.nonav #bottomnav{display:none;}
.navbtn{
  flex:1; background:none; border:none; border-radius:10px; padding:4px 0 2px;
  display:flex; flex-direction:column; align-items:center; gap:1px;
  color:var(--faint); font-size:9px; letter-spacing:1px; text-transform:uppercase; cursor:pointer;
}
.navbtn svg{width:22px; height:22px;}
.navbtn:hover{color:var(--dim);}
.navbtn.active{color:var(--hollow);}
.navbtn.active svg{filter:drop-shadow(0 0 7px #9adfd4aa);}
.navbtn.active .nlbl{text-shadow:0 0 9px #9adfd488;}

/* ---------- element theming ---------- */
.e-fire{--ec:var(--fire);} .e-water{--ec:var(--water);} .e-earth{--ec:var(--earth);}
.e-thunder{--ec:var(--thunder);} .e-light{--ec:var(--light);} .e-dark{--ec:var(--dark);}
.e-hollow{--ec:var(--hollow);}
.ei{width:12px; height:12px; vertical-align:-1.5px;}

/* ---------- shared screen chrome ---------- */
.shead{
  position:sticky; top:0; z-index:6; display:flex; align-items:center; gap:10px;
  padding:12px 14px 10px; border-bottom:1px solid #1a2336;
  background:linear-gradient(180deg,#0c1119f5,#0c1119e0); backdrop-filter:blur(5px);
}
.shead h2{font-size:18px; letter-spacing:1px; flex:1;}
.sigil-pill{
  display:inline-flex; align-items:center; gap:5px; white-space:nowrap;
  background:#141b2c; border:1px solid #33406044; border-radius:999px;
  padding:3px 10px 3px 8px; font-size:12.5px; color:var(--gold); font-weight:600;
}
.sigil-pill svg{width:13px; height:13px;}
.sigil-count{color:var(--gold); font-weight:600;}
.scene{width:100%; height:100%; display:block;}

/* ---------- title ---------- */
.title-wrap{min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:13px; padding:24px 20px;}
.title-hollow{
  font-family:Georgia,serif; font-size:34px; letter-spacing:6px; font-weight:700;
  background:linear-gradient(180deg,#eef7f5 20%, var(--hollow) 60%, #29403c);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 0 42px #9adfd433;
}
.title-sub{color:var(--dim); letter-spacing:3px; font-size:11px; text-transform:uppercase;}
.title-glyph{width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%, #d9f4ee 0%, #9adfd4 22%, #23413c 65%, #0d1512 100%);
  box-shadow:0 0 60px #9adfd440, inset 0 0 30px #05201b; position:relative; margin-bottom:6px;}
.title-glyph::after{content:""; position:absolute; inset:11px; border-radius:50%; border:1px solid #d9f4ee33;}

/* ---------- HOME ---------- */
.home-banner{position:relative; height:216px; overflow:hidden; border-bottom:1px solid #1a2336;}
.home-banner .scene{position:absolute; inset:0;}
.banner-shade{position:absolute; inset:0; background:linear-gradient(180deg,#0a0d1440 0%, transparent 34%, #0a0d14f2 97%);}
.banner-ch{position:absolute; left:14px; bottom:8px;}
.banner-ch .bk{font-size:10px; letter-spacing:2.5px; color:var(--gold); text-transform:uppercase;}
.banner-ch .bt{font-family:Georgia,serif; font-size:21px; color:#eef3fb; text-shadow:0 2px 10px #000;}
.home-banner .sigil-pill{position:absolute; top:10px; right:10px; box-shadow:0 2px 10px #000a;}
.ticker{
  display:flex; align-items:center; gap:8px; margin:11px 12px 0; padding:6px 10px;
  background:#0f1524; border:1px solid #1d2740; border-radius:9px;
  font-size:11.5px; color:#a8bad8; overflow:hidden; white-space:nowrap;
}
.ticker .tklbl{flex:none; font-size:8.5px; letter-spacing:1.5px; color:var(--hollow); border:1px solid #2c4a46; border-radius:5px; padding:1px 5px;}
.ticker .tkwin{flex:1; overflow:hidden;}
.ticker .tk{display:inline-block; padding-left:100%; animation:marq 20s linear infinite;}
@keyframes marq{to{transform:translateX(-100%);}}
.bigbtn{
  display:block; width:calc(100% - 26px); margin:15px auto 8px; padding:13px 14px 11px;
  font-family:Georgia,serif; font-size:17px; letter-spacing:1.2px; color:#1c1305;
  background:linear-gradient(180deg,#f5e0a0,#dcb95c 55%,#b28e36);
  border:1px solid #f7e7b4; border-radius:13px;
  box-shadow:0 5px 20px #e8c86a2e, inset 0 1px 0 #fff8; text-align:center;
}
.bigbtn:hover{box-shadow:0 5px 30px #e8c86a55; border-color:#fff2cf;}
.bigbtn .sub{display:block; font-family:"Segoe UI",system-ui,sans-serif; font-size:10.5px; letter-spacing:.6px; color:#4a3812; margin-top:2px; font-weight:600;}
.homerow{display:flex; gap:9px; margin:4px 13px;}
.homerow button{flex:1; padding:9px 6px; font-size:12px; color:var(--dim);}
#version{
  position:absolute; right:10px; bottom:66px; font-size:10.5px; color:var(--faint);
  cursor:default; user-select:none; z-index:22; padding:5px 7px;
}

/* ---------- STORY list ---------- */
.chlist{padding:8px 0 20px;}
.chrow{
  display:flex; gap:11px; align-items:center; margin:9px 12px; padding:9px;
  background:var(--panel); border:1px solid var(--line); border-radius:13px;
  cursor:pointer; transition:.15s; text-align:left; width:calc(100% - 24px); color:var(--ink);
}
.chrow:hover:not(.locked){border-color:#3d4d73;}
.chrow.current{border-color:var(--gold); box-shadow:0 0 16px #e8c86a2a;}
.chrow.locked{opacity:.45; filter:grayscale(.8); cursor:default;}
.chrow .thumb{width:92px; height:54px; border-radius:8px; overflow:hidden; flex:none; border:1px solid #1a2336; background:#0a0e18; position:relative;}
.chrow .thumb .scene{position:absolute; inset:0;}
.chrow .cmeta{flex:1; min-width:0;}
.chrow .cnum{font-size:9.5px; letter-spacing:2px; color:var(--gold); text-transform:uppercase;}
.chrow.locked .cnum{color:var(--faint);}
.chrow .ctitle{font-family:Georgia,serif; font-size:15.5px; color:#e8eef8; margin:1px 0;}
.chrow .cdesc{font-size:11px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.chrow .cstate{flex:none; font-size:9.5px; letter-spacing:1px; text-align:center; min-width:58px;}
.cstate .tag{display:inline-block; border:1px solid; border-radius:6px; padding:2px 7px;}
.cstate .tag.go{color:#1c1305; background:var(--gold); border-color:#f0dc9c; font-weight:700;}
.cstate .tag.rp{color:var(--hollow); border-color:#2c4a46;}
.cstate .tag.lk{color:var(--faint); border-color:#26304a;}
.cstate .rew{display:block; margin-top:4px; color:var(--gold); font-size:10px;}

/* ---------- PARTY ---------- */
.pgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:12px 12px 22px;}
.pcard{
  --ec:var(--hollow); position:relative; text-align:center; cursor:pointer; transition:.15s;
  background:linear-gradient(180deg,#151d30,#0d1322);
  border:1px solid color-mix(in srgb, var(--ec) 50%, #223); border-radius:13px; padding:8px 5px 7px;
  color:var(--ink);
}
.pcard:hover{box-shadow:0 0 15px color-mix(in srgb, var(--ec) 35%, transparent); transform:translateY(-2px);}
.pcard .port{width:76%; aspect-ratio:1; display:block; margin:1px auto 3px;
  border-radius:50%; background:radial-gradient(circle at 50% 36%, color-mix(in srgb,var(--ec) 24%,#0d1322), #090e18 76%);
  border:1px solid color-mix(in srgb, var(--ec) 40%, #223);}
.pcard .uname{font-size:12px; font-weight:600;}
.pcard .urole{font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:1px;}
.rankpips{display:flex; gap:3px; justify-content:center; margin-top:5px; min-height:8px;}
.rp{width:7px; height:7px; transform:rotate(45deg); background:#121a2c; border:1px solid #2c3a54; border-radius:1px;}
.rp.on{background:linear-gradient(135deg,#fdf3cf,var(--gold)); border-color:#f0dc9c; box-shadow:0 0 5px #e8c86a88;}

/* ---------- unit detail sheet ---------- */
.sheet{
  position:absolute; inset:0; z-index:45; overflow-y:auto; --ec:var(--hollow);
  background:radial-gradient(500px 340px at 50% -60px, color-mix(in srgb,var(--ec) 14%,transparent), transparent 70%), var(--bg);
  animation:sheetup .22s ease-out;
}
@keyframes sheetup{from{transform:translateY(34px); opacity:0;}}
.sheet .closebtn{position:sticky; top:10px; float:right; margin-right:12px; z-index:5; font-size:12px; padding:5px 12px;}
.sheet .hero{position:relative; height:212px; display:flex; align-items:flex-end; justify-content:center;}
.sheet .hero .port{width:186px; height:186px; filter:drop-shadow(0 10px 28px color-mix(in srgb,var(--ec) 40%,transparent));}
.sheet .nm{ text-align:center; margin-top:6px;}
.sheet .nm h2{font-size:23px;}
.sheet .nm .ep{font-size:12px; color:color-mix(in srgb,var(--ec) 80%,#fff); letter-spacing:2px; text-transform:uppercase;}
.quote{font-family:Georgia,serif; color:#cfd9ea; font-style:italic; margin:8px 22px 2px; font-size:14px; text-align:center;}
.chiprow{display:flex; gap:7px; margin:10px 14px 2px; flex-wrap:wrap; justify-content:center;}
.tagchip{border:1px solid #33406a; background:#10182c; border-radius:999px; padding:2.5px 11px; font-size:11px; letter-spacing:.8px; color:var(--dim);}
.tagchip.el{color:var(--ec); border-color:color-mix(in srgb,var(--ec) 55%,#223);}
.statline{display:flex; gap:8px; justify-content:center; margin:9px 14px 2px;}
.statline .st{flex:1; max-width:110px; text-align:center; background:#0f1526; border:1px solid var(--line); border-radius:10px; padding:6px 4px;}
.statline .st b{display:block; font-size:15px; color:#eef3fb;}
.statline .st span{font-size:9px; letter-spacing:1.5px; color:var(--faint); text-transform:uppercase;}
.kit{margin:10px 13px 26px;}
.kit h3{font-size:11px; letter-spacing:2px; color:var(--faint); text-transform:uppercase; margin:13px 2px 2px;}
.kitrow{border:1px solid var(--line); border-left:3px solid var(--ec); border-radius:9px; padding:7px 10px; margin:7px 0; background:#101629;}
.kitrow .tn{display:flex; justify-content:space-between; gap:8px; font-size:13px; align-items:baseline;}
.kitrow .tn b{color:#e8eef8;}
.kitrow .cost{color:var(--energy); font-size:10.5px; white-space:nowrap;}
.kitrow .cost.blade{color:var(--hollow);}
.kitrow .kd{color:var(--dim); font-size:11.5px; margin-top:1px;}
.kitrow.passive{border-left-color:var(--gold); background:#131627;}
.formtabs{display:flex; gap:8px; margin:12px 13px 0;}
.formtabs button{flex:1; font-size:12px; padding:7px;}
.formtabs button.on{border-color:var(--hollow); color:#eafffb; box-shadow:0 0 10px #9adfd433;}

/* ---------- SUMMON ---------- */
.sumbanner{
  position:relative; margin:12px; border-radius:15px; overflow:hidden;
  border:1px solid #2c3a5c; background:linear-gradient(210deg,#1a2440,#0c1120 70%);
  padding:16px 14px 13px; text-align:center;
}
.sumbanner .glow{position:absolute; inset:-30px; background:radial-gradient(240px 130px at 50% 30%, #4db8ff2e, transparent 70%); pointer-events:none;}
.sumbanner h3{font-family:Georgia,serif; font-size:17px; letter-spacing:1.5px; color:#eaf2ff;}
.sumbanner .featrow{display:flex; justify-content:center; gap:2px; margin:8px 0 4px;}
.sumbanner .featrow svg{width:64px; height:64px; filter:drop-shadow(0 4px 12px #4db8ff44);}
.pullrow{display:flex; gap:9px; margin:2px 12px;}
.pullrow button{flex:1; padding:11px 6px 9px; font-size:13.5px;}
.pullrow button b{display:block; color:var(--gold); font-size:11px; margin-top:1px; font-weight:600;}
.pullrow button:not(:disabled){border-color:#3a4d7c;}
.summon-stage{min-height:170px; display:flex; align-items:center; justify-content:center; gap:9px; flex-wrap:wrap; padding:14px 6px;}
.pullcard{width:96px; height:134px; border-radius:11px; perspective:700px;}
.pullinner{width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .8s cubic-bezier(.2,.7,.3,1.2);}
.pullcard.flipped .pullinner{transform:rotateY(180deg);}
.pullface{position:absolute; inset:0; backface-visibility:hidden; border-radius:11px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;}
.pullback{background:repeating-linear-gradient(45deg, #131b2e 0 9px, #0f1626 9px 18px);
  border:1px solid #33507a; box-shadow:0 0 20px #4db8ff33; animation:pulseback 1.2s ease-in-out infinite;}
@keyframes pulseback{50%{box-shadow:0 0 30px #4db8ff66;}}
.pullback::after{content:"◈"; font-size:34px; color:#4db8ff88;}
.pullfront{transform:rotateY(180deg);
  background:linear-gradient(200deg, color-mix(in srgb, var(--ec) 30%, #101828), #0b101d 70%);
  border:1px solid var(--ec); box-shadow:0 0 22px color-mix(in srgb, var(--ec) 50%, transparent);}
.pullfront svg{width:62px; height:62px;}
.pullfront .uname{font-size:11px; font-weight:600;}
.pullfront .urole{font-size:8px; color:var(--dim); text-transform:uppercase; letter-spacing:1px;}
.pullrank{color:var(--gold); letter-spacing:1.5px; font-size:10px; min-height:14px;}
.raysin{animation:raysin .6s ease-out;}
@keyframes raysin{from{transform:scale(.6); filter:brightness(2.4);} to{transform:scale(1);}}
.sumlock{margin:40px 22px; text-align:center;}
.sumlock .port{width:120px; height:120px; opacity:.4; margin:0 auto 10px;}

/* ---------- TOWN ---------- */
.townscene{position:relative; height:252px; border-bottom:1px solid #1a2336; overflow:hidden;}
.townscene .scene{position:absolute; inset:0;}
.townshade{position:absolute; inset:0; background:linear-gradient(180deg,transparent 62%, #0a0d14e8 98%); pointer-events:none;}
.hotspot{
  position:absolute; transform:translate(-50%,-50%); background:none; border:none;
  display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--light); cursor:pointer; padding:4px; z-index:3;
}
.hotspot .dot{width:13px; height:13px; border-radius:50%; border:2px solid var(--light);
  background:#ffe9b022; box-shadow:0 0 10px #ffe9b0aa; animation:hspulse 1.7s infinite;}
@keyframes hspulse{50%{box-shadow:0 0 18px #ffe9b0; transform:scale(1.18);}}
.hotspot .hlabel{font-size:8.5px; letter-spacing:1px; text-transform:uppercase;
  background:#0a0f1acc; border-radius:6px; padding:1.5px 7px; text-shadow:0 1px 3px #000; white-space:nowrap;}
.towndlg{margin:13px 14px;}
.townhint{margin:2px 16px; font-size:11px; color:var(--faint); text-align:center;}

/* ---------- dialogue cards ---------- */
.dlg-wrap{min-height:100%; display:flex; align-items:center; justify-content:center; padding:14px;}
.dlg-card{
  width:100%; background:linear-gradient(180deg,#141b2cf0,#0e1424f6);
  border:1px solid var(--line); border-radius:15px; padding:0 0 18px;
  box-shadow:0 18px 60px #00000088; cursor:pointer; position:relative; overflow:hidden;
}
.dlg-scene{position:relative; height:132px; border-bottom:1px solid var(--line);}
.dlg-scene .scene{position:absolute; inset:0;}
.dlg-scene::after{content:""; position:absolute; inset:0; background:linear-gradient(180deg,transparent 40%, #0e1424e8 98%);}
.dlg-body{padding:16px 22px 0;}
.dlg-chapter{font-family:Georgia,serif; color:var(--gold); letter-spacing:2.5px; font-size:11.5px; text-transform:uppercase; margin-bottom:11px;}
.dlg-speaker{font-family:Georgia,serif; font-size:14px; color:var(--hollow); margin-bottom:5px; letter-spacing:1px;}
.dlg-text{font-family:Georgia,serif; font-size:17.5px; line-height:1.6; color:#e8eef8; min-height:88px;}
.dlg-hint{margin-top:16px; color:var(--faint); font-size:11px; display:flex; justify-content:space-between;}
.dlg-skip{position:absolute; top:9px; right:10px; font-size:11px; padding:4px 11px; z-index:4; background:#0d1322dd;}

/* ---------- battle: portrait layout ---------- */
.bwrap{height:100%; display:flex; flex-direction:column;}
.bhead{display:flex; align-items:baseline; gap:9px; padding:9px 12px 7px; border-bottom:1px solid var(--line); background:#0c1119;}
.bhead h2{font-size:16px; color:#eef3fb; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.bhead .round{color:var(--gold); font-size:11.5px; white-space:nowrap;}
.bhead .note{margin-left:auto; color:var(--dim); font-size:9.5px; text-align:right; max-width:44%;}
.bfield{flex:1 1 auto; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:7px; padding-bottom:6px;}
.ezone{position:relative; padding:9px 8px 3px;}
.scenebg{position:absolute; inset:0; width:100%; height:100%; opacity:.32;
  -webkit-mask-image:linear-gradient(180deg,#000 50%, transparent 98%);
  mask-image:linear-gradient(180deg,#000 50%, transparent 98%);}
.row-enemies{position:relative; display:flex; flex-wrap:wrap; gap:7px; justify-content:center; min-height:120px; align-items:stretch;}
.row-party{display:flex; gap:5px; padding:0 6px; align-items:stretch;}

/* unit cards */
.ucard{
  --ec:var(--hollow); position:relative; transition:.15s;
  background:linear-gradient(180deg,#151d30e8,#0d1322f2);
  border:1px solid color-mix(in srgb, var(--ec) 45%, #223); border-radius:11px; padding:5px 5px 4px;
}
.ucard.mini{flex:1 1 0; min-width:0; text-align:center;}
.ucard.mini .port{width:84%; max-width:54px; aspect-ratio:1; display:block; margin:0 auto;
  border-radius:50%; background:radial-gradient(circle at 50% 36%, color-mix(in srgb,var(--ec) 22%,#0d1322), #090e18 78%);}
.ucard.enemy{width:31%; min-width:100px; max-width:132px; text-align:center;}
.ucard.enemy .eport{width:88%; max-height:76px; aspect-ratio:1.1; display:block; margin:0 auto;}
.ucard.enemy.big{width:64%; max-width:250px;}
.ucard.enemy.big .eport{max-height:110px; aspect-ratio:1.5;}
.ucard.selectable{cursor:pointer;}
.ucard.selectable:hover{box-shadow:0 0 13px color-mix(in srgb, var(--ec) 40%, transparent);}
.ucard.sel{box-shadow:0 0 15px color-mix(in srgb, var(--ec) 60%, transparent); border-color:var(--ec); transform:translateY(-4px);}
.ucard.acted{opacity:.55;}
.ucard.dead{filter:grayscale(1) brightness(.55); opacity:.5;}
.ucard.targetable{outline:2px dashed var(--gold); cursor:crosshair;}
.ucard.targetable:hover{outline-style:solid; box-shadow:0 0 18px #e8c86a55;}
.uname{text-align:center; font-size:10.5px; font-weight:600; letter-spacing:.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.usub{text-align:center; font-size:8px; color:var(--dim); text-transform:uppercase; letter-spacing:.8px;}
.bar{height:7px; background:#080c14; border:1px solid #202a3f; border-radius:5px; overflow:hidden; position:relative; margin-top:3px;}
.bar > i{display:block; height:100%; background:linear-gradient(90deg,#2f9d63,var(--hp)); transition:width .25s;}
.bar.low > i{background:linear-gradient(90deg,#8a2f2f,var(--hplow));}
.bar.brkbar > i{background:linear-gradient(90deg,#8a6a1f,var(--brk));}
.bar span{position:absolute; inset:0; font-size:7.5px; line-height:7px; text-align:center; color:#ffffffb0; text-shadow:0 1px 2px #000;}
.pips{display:flex; gap:3px; justify-content:center; margin-top:4px;}
.pip{width:9px; height:9px; transform:rotate(45deg); border:1px solid #33507a; background:#0b1220; border-radius:2px;}
.pip.on{background:linear-gradient(135deg,#bfe9ff,var(--energy)); box-shadow:0 0 6px #59c8ff88; border-color:#9fdcff;}
.blades{display:flex; gap:2px; justify-content:center; margin-top:4px; flex-wrap:wrap; min-height:11px;}
.shard{width:6px; height:11px; background:linear-gradient(200deg,#eafffb,#9adfd4 55%,#2c554e); clip-path:polygon(50% 0, 100% 32%, 68% 100%, 22% 78%, 0 30%); box-shadow:0 0 5px #9adfd499;}
.chips{display:flex; gap:2px; flex-wrap:wrap; justify-content:center; margin-top:3px; min-height:12px;}
.chip{font-size:7.5px; border:1px solid var(--line); border-radius:4px; padding:0 3px; color:var(--dim); background:#0c1220;}
.chip.good{color:var(--heal); border-color:#2c4a3a;}
.chip.bad{color:var(--warn); border-color:#4a2c2c;}
.chip.shield{color:var(--hollow); border-color:#2c4a46;}
.intent{font-size:9px; color:var(--dim); text-align:center; margin-top:3px; min-height:11px; line-height:1.3;}
.formtag{position:absolute; top:4px; left:6px; font-size:8px; letter-spacing:1px; color:var(--brk); text-transform:uppercase; z-index:2;}
.teletag{position:absolute; top:4px; right:6px; font-size:8px; color:var(--warn); letter-spacing:1px; animation:teleblink 1s infinite; z-index:2;}
@keyframes teleblink{50%{opacity:.35;}}
.stagtag{position:absolute; top:15px; right:6px; font-size:8px; color:var(--gold); z-index:2;}

/* action sheet (thumb zone) */
.actionbar{
  flex:0 0 auto; background:linear-gradient(180deg,#101828,#0b101d);
  border-top:1px solid #22304c; padding:8px 10px calc(9px + env(safe-area-inset-bottom));
  min-height:98px; z-index:8;
}
.ab-title{font-size:11px; color:var(--dim); margin-bottom:6px; letter-spacing:.4px;}
.ab-title b{color:var(--ink);}
.abtns{display:grid; grid-template-columns:1fr 1fr; gap:7px;}
.abtn{position:relative; padding:7px 11px 6px; text-align:left; min-width:0;}
.abtn .nm{display:block; font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.abtn .ct{display:block; font-size:9.5px; color:var(--energy); margin-top:1px;}
.abtn .ct.blade{color:var(--hollow);}
.abtn.tier-Burst{border-color:#6a5a2c;} .abtn.tier-Burst .nm{color:var(--gold);}
.abtn.glowing{border-color:var(--hollow); color:#eafffb; animation:bulwarkglow 1.1s ease-in-out infinite;}
@keyframes bulwarkglow{0%,100%{box-shadow:0 0 8px #9adfd455;} 50%{box-shadow:0 0 26px #9adfd4cc;}}
.cancelbtn{border-color:#5a3535;}
.tipbar{background:#101a2e; border:1px dashed #2c3c5e; color:#a8c6ef; border-radius:9px; font-size:11px; padding:5px 11px; margin:0 8px;}

/* battle log (pull-up) */
.logtab{
  flex:0 0 auto; display:flex; align-items:center; gap:7px; width:100%;
  background:#0d1322; border:none; border-top:1px solid var(--line); border-radius:0;
  padding:5px 12px; color:var(--dim); font-size:10.5px; text-align:left; cursor:pointer;
}
.logtab .last{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#b9c6dd; font-style:italic;}
.logtab .cnt{flex:none; color:var(--faint); letter-spacing:1px;}
.logsheet{
  position:absolute; left:0; right:0; bottom:0; top:24%; z-index:36;
  background:#0a0f1af8; border-top:1px solid #2c3a5c; border-radius:15px 15px 0 0;
  display:flex; flex-direction:column; animation:sheetup .2s ease-out; box-shadow:0 -14px 50px #000a;
}
.logsheet .lhead{display:flex; justify-content:space-between; align-items:center; padding:9px 14px 8px; border-bottom:1px solid var(--line);}
.logsheet .lhead b{font-size:12px; letter-spacing:1.5px; color:var(--dim); text-transform:uppercase;}
.logsheet .lhead button{font-size:11px; padding:4px 12px;}
.logpane{flex:1; overflow-y:auto; padding:8px 14px 14px; font-size:12px;}
.logpane p{margin:2px 0; color:var(--dim);}
.logpane p.act{color:var(--ink);}
.logpane p.dmg{color:#f0b090;}
.logpane p.edmg{color:#e08b8b;}
.logpane p.heal{color:var(--heal);}
.logpane p.brk{color:var(--brk);}
.logpane p.stagger{color:var(--gold); font-weight:600;}
.logpane p.warn{color:var(--warn); font-weight:600;}
.logpane p.buff{color:#9fc3ee;}
.logpane p.shield{color:var(--hollow);}
.logpane p.blade{color:var(--hollow);}
.logpane p.kill{color:#f3d9a0; font-weight:600;}
.logpane p.sys{color:#b9c6dd; font-style:italic;}
.logpane p.eact{color:#d9a0a0;}
.logpane p.reveal{color:#9fdcff; font-style:italic;}
.logpane p.awaken{color:#eafffb; font-weight:700; text-shadow:0 0 8px #9adfd488;}
.logpane p.rounddiv{color:var(--faint); text-align:center; letter-spacing:2px; margin:7px 0 4px; border-top:1px solid #1b2438; padding-top:5px;}

/* ---------- overlays ---------- */
.overlay{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:50; background:#060910d8; animation:fadein .3s; padding:18px;}
@keyframes fadein{from{opacity:0;}}
.ov-card{width:min(360px,92vw); text-align:center; padding:32px 24px 26px; background:#10182af2; border:1px solid var(--line); border-radius:17px; box-shadow:0 20px 80px #000;}
.ov-card h2{font-size:22px; margin-bottom:12px;}
.ov-card p{color:var(--dim); font-family:Georgia,serif; font-size:15px; margin:8px 0;}
.whiteout{position:fixed; inset:0; background:#f4fffd; z-index:90; opacity:0; animation:whiteout 2.6s forwards;}
@keyframes whiteout{0%{opacity:0;} 45%{opacity:1;} 100%{opacity:1;}}
.awk-flash{position:fixed; inset:0; z-index:80; pointer-events:none;
  background:radial-gradient(circle at 50% 62%, #d9f4ee, #9adfd4 30%, transparent 70%);
  animation:awkflash 1.5s forwards;}
@keyframes awkflash{0%{opacity:0;} 25%{opacity:.95;} 100%{opacity:0;}}
.modal{position:fixed; inset:0; z-index:60; background:#05080fd9; display:flex; align-items:center; justify-content:center; padding:18px;}

/* ---------- squad picker / interlude / misc ---------- */
.pick .pcard.picked{border-color:var(--gold); box-shadow:0 0 14px #e8c86a44;}
.pick .pcard.lockedin{border-color:var(--hollow); box-shadow:0 0 14px #9adfd444; cursor:default;}
.locknote{position:absolute; top:5px; right:7px; font-size:8px; color:var(--hollow); letter-spacing:1px;}
.vignette{border-left:2px solid var(--line); padding:8px 14px; margin:11px 0; font-family:Georgia,serif;}
.vignette .who{color:var(--gold); font-size:11.5px; letter-spacing:2px; text-transform:uppercase;}
.vignette .say{font-size:14.5px; color:#e4ebf6; margin-top:3px;}
.hubrow{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;}
.panelbox{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:17px 17px; margin:13px 12px;}
.credits li{margin:6px 0 6px 16px; color:var(--dim); font-size:12.5px;}
#toast{
  position:absolute; left:50%; bottom:86px; transform:translateX(-50%);
  background:#141c2ef4; border:1px solid #33406a; color:var(--ink);
  padding:8px 16px; border-radius:10px; font-size:12.5px; opacity:0; pointer-events:none;
  transition:opacity .3s; z-index:100; max-width:86%; text-align:center; box-shadow:0 8px 26px #000a;
}
#toast.show{opacity:1;}
.fadein-slow{animation:fadein 1.2s;}
</style>
</head>
